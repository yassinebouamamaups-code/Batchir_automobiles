<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reprise automobile - Batchir Automobiles</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="hero-small">

<h1>Estimez la reprise de votre véhicule</h1>

<p>Réponse rapide en quelques minutes</p>

</header>


<section class="reprise-section">

<h2>Estimation gratuite</h2>

<p>
Remplissez le formulaire ci-dessous.  
Nous estimons la valeur de reprise de votre véhicule et vous recontactons sous 24h.
</p>


<form action="https://formsubmit.co/contact@batchirautomobiles.com" method="POST" class="reprise-form">

<input type="hidden" name="_subject" value="Nouvelle demande de reprise">

<input type="text" name="Immatriculation" placeholder="Immatriculation" required>

<input type="text" name="Marque" placeholder="Marque" required>

<input type="text" name="Modele" placeholder="Modèle" required>

<input type="number" name="Kilometrage" placeholder="Kilométrage" required>

<textarea name="Frais" placeholder="Frais à prévoir (rayures, pneus, entretien...)"></textarea>

<input type="email" name="Email" placeholder="Votre email" required>

<input type="tel" name="Telephone" placeholder="Votre téléphone">

<button type="submit">Estimer mon véhicule</button>

</form>

</section>

</body>
</html>
